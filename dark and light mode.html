<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Light Dark Switch</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
transition:0.3s;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#ffffff;
color:#333;
}

/* DARK MODE */

body.dark{
background:#121212;
color:#f1f1f1;
}

/* CONTAINER */

.container{
text-align:center;
}

/* SWITCH */

.switch{
position:relative;
display:inline-block;
width:60px;
height:34px;
margin-top:20px;
}

.switch input{
opacity:0;
width:0;
height:0;
}

.slider{
position:absolute;
cursor:pointer;
top:0;
left:0;
right:0;
bottom:0;
background:#ccc;
border-radius:34px;
}

.slider:before{
position:absolute;
content:"";
height:26px;
width:26px;
left:4px;
bottom:4px;
background:white;
border-radius:50%;
transition:.4s;
}

/* WHEN SWITCH IS ON */

input:checked + .slider{
background:#4CAF50;
}

input:checked + .slider:before{
transform:translateX(26px);
}

/* RESPONSIVE */

@media(max-width:500px){
h1{
font-size:24px;
}
}

</style>

</head>

<body>

<div class="container">

<h1>Light / Dark Mode</h1>

<label class="switch">
<input type="checkbox" id="themeToggle">
<span class="slider"></span>
</label>

<p style="margin-top:15px;">Toggle the switch to change theme</p>

</div>

<script>

const toggle = document.getElementById("themeToggle");

/* Load saved theme */

if(localStorage.getItem("theme") === "dark"){
document.body.classList.add("dark");
toggle.checked = true;
}

/* Toggle theme */

toggle.addEventListener("change", ()=>{

if(toggle.checked){
document.body.classList.add("dark");
localStorage.setItem("theme","dark");
}else{
document.body.classList.remove("dark");
localStorage.setItem("theme","light");
}

});

</script>

</body>
</html>
