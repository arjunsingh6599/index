<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Countdown Timer</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#667eea,#764ba2);
}

.container{
background:white;
padding:40px;
border-radius:15px;
text-align:center;
width:90%;
max-width:400px;
box-shadow:0 10px 30px rgba(0,0,0,0.3);
}

h1{
margin-bottom:20px;
}

#time{
font-size:60px;
font-weight:bold;
margin:20px 0;
color:#333;
}

input{
padding:10px;
width:120px;
border-radius:5px;
border:1px solid #ccc;
text-align:center;
margin-bottom:20px;
}

.buttons{
display:flex;
justify-content:center;
gap:10px;
flex-wrap:wrap;
}

button{
padding:10px 18px;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
color:white;
}

.start{
background:#28a745;
}

.pause{
background:#ffc107;
color:black;
}

.reset{
background:#dc3545;
}

button:hover{
opacity:0.9;
}

/* MOBILE */

@media(max-width:500px){

#time{
font-size:45px;
}

.container{
padding:25px;
}

}

</style>

</head>

<body>

<div class="container">

<h1>Countdown Timer</h1>

<input type="number" id="minutesInput" placeholder="Minutes">

<div id="time">00:00</div>

<div class="buttons">
<button class="start" onclick="startTimer()">Start</button>
<button class="pause" onclick="pauseTimer()">Pause</button>
<button class="reset" onclick="resetTimer()">Reset</button>
</div>

</div>

<script>

let timer;
let timeLeft = 0;

function startTimer(){

let inputMinutes = document.getElementById("minutesInput").value;

if(timeLeft === 0){
timeLeft = inputMinutes * 60;
}

timer = setInterval(updateTimer,1000);

}

function updateTimer(){

if(timeLeft <= 0){
clearInterval(timer);
document.getElementById("time").innerText="00:00";
alert("Time's Up!");
return;
}

timeLeft--;

let minutes = Math.floor(timeLeft / 60);
let seconds = timeLeft % 60;

minutes = minutes < 10 ? "0"+minutes : minutes;
seconds = seconds < 10 ? "0"+seconds : seconds;

document.getElementById("time").innerText = minutes + ":" + seconds;

}

function pauseTimer(){
clearInterval(timer);
}

function resetTimer(){
clearInterval(timer);
timeLeft = 0;
document.getElementById("time").innerText="00:00";
document.getElementById("minutesInput").value="";
}

</script>

</body>
</html>
