<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern Image Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
min-height:100vh;
background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
color:white;
}

/* HEADER */

header{
background:rgba(255,255,255,0.1);
backdrop-filter:blur(10px);
padding:30px 10%;
text-align:center;
border-bottom:1px solid rgba(255,255,255,0.2);
}

header h1{
font-size:34px;
}

header p{
margin-top:5px;
opacity:0.8;
}

/* SEARCH */

.search-box{
margin-top:20px;
}

.search-box input{
padding:12px;
width:260px;
border:none;
border-radius:30px;
outline:none;
}

.search-box button{
padding:12px 20px;
border:none;
background:#ff6a00;
color:white;
border-radius:30px;
cursor:pointer;
margin-left:8px;
}

.search-box button:hover{
background:#ff3d00;
}

/* GALLERY */

.gallery{
padding:40px 10%;
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.gallery img{
width:100%;
height:260px;
object-fit:cover;
border-radius:14px;
cursor:pointer;
transition:0.4s;
box-shadow:0 10px 25px rgba(0,0,0,0.5);
}

.gallery img:hover{
transform:scale(1.07);
}

/* LOAD MORE */

.load-more{
display:block;
margin:20px auto 50px;
padding:14px 35px;
border:none;
background:linear-gradient(135deg,#ff6a00,#ff3d00);
color:white;
border-radius:30px;
cursor:pointer;
font-size:16px;
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
display:none;
justify-content:center;
align-items:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:12px;
}

.close{
position:absolute;
top:25px;
right:40px;
font-size:40px;
cursor:pointer;
color:white;
}

</style>
</head>

<body>

<header>

<h1>Modern Image Gallery</h1>
<p>Search and explore beautiful photos</p>

<div class="search-box">
<input type="text" id="searchInput" placeholder="Search images...">
<button onclick="searchImages()">Search</button>
</div>

</header>

<div class="gallery" id="gallery"></div>

<button class="load-more" id="loadBtn" onclick="loadMore()">Load More</button>

<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">×</span>
<img id="lightboxImg">
</div>

<script>

const gallery = document.getElementById("gallery");
const loadBtn = document.getElementById("loadBtn");

let currentQuery = "nature";

let imagesLoaded = 0;
const maxImages = 24;
const imagesPerLoad = 12;

function loadImages(query="nature", reset=true){

if(reset){
gallery.innerHTML="";
imagesLoaded = 0;
currentQuery = query;
loadBtn.style.display="block";
}

for(let i=0;i<imagesPerLoad;i++){

if(imagesLoaded >= maxImages){
loadBtn.style.display="none";
return;
}

let img=document.createElement("img");

img.src=`https://picsum.photos/600/400?random=${imagesLoaded}`;

img.onclick=()=>openLightbox(img.src);

gallery.appendChild(img);

imagesLoaded++;

}

if(imagesLoaded >= maxImages){
loadBtn.style.display="none";
}

}

function searchImages(){

let query=document.getElementById("searchInput").value;

if(query.trim()==="") query="nature";

loadImages(query,true);

}

function loadMore(){
loadImages(currentQuery,false);
}

function openLightbox(src){
document.getElementById("lightbox").style.display="flex";
document.getElementById("lightboxImg").src=src;
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}

loadImages();

</script>

</body>
</html>
